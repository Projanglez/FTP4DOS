/*
   NCFTP386 - mTCP Compile-Time-Konfiguration (CFG_H)

   Jeder mTCP-Header macht `#include CFG_H`. Diese Datei wird ueber
   -DCFG_H="ncftp.cfg" eingebunden (siehe MAKEFILE) und muss auf dem
   Include-Pfad liegen (-I./src).

   Vorlage: mtcp/APPS/FTP/FTP.CFG (auf das Noetige reduziert).
   Hinweise:
     - Nur #defines verwenden
     - Alle Zeiten in Millisekunden
*/

#ifndef CONFIG_H
#define CONFIG_H


/* Programmname fuer mTCP-Trace-Ausgaben (z.B. Utils.cpp Versionsbanner,
   #ifndef NOTRACE). Muss definiert sein, solange Tracing nicht per NOTRACE
   abgeschaltet ist. */
#define MTCP_PROGRAM_NAME "ncftp386"


/* Globale Optionen (Tracing, SLEEP_CALLS). Liegt in mtcp/TCPINC. */
#include "Global.Cfg"


/* mTCP 2025-01-10: Global.Cfg setzt viele der folgenden Werte bereits.
   Vor dem lokalen Ueberschreiben per #undef freigeben -> keine Makro-
   Redefinition-Warnungen (Muster aus mtcp/APPS/FTP/FTP.CFG). #undef eines
   nicht definierten Makros ist ein harmloser No-Op. */
#undef PKT_DUMP_BYTES
#undef PACKET_BUFFERS
#undef PACKET_BUFFER_LEN
#undef ARP_MAX_ENTRIES
#undef ARP_MAX_PENDING
#undef ARP_RETRIES
#undef ARP_TIMEOUT
#undef IP_MAX_FRAG_PACKETS
#undef IP_MAX_FRAGS_PER_PACKET
#undef IP_BIGPACKET_SIZE
#undef IP_FRAG_REASSEMBLY_TIMEOUT
#undef TCP_MAX_SOCKETS
#undef TCP_MAX_XMIT_BUFS
#undef TCP_SOCKET_RING_SIZE
#undef TCP_CLOSE_TIMEOUT
#undef UDP_MAX_CALLBACKS
#undef DNS_MAX_NAME_LEN
#undef DNS_MAX_ENTRIES
#undef DNS_HANDLER_PORT
#undef DNS_RECURSION_DESIRED
#undef DNS_INITIAL_SEND_TIMEOUT
#undef DNS_RETRY_THRESHOLD
#undef DNS_TIMEOUT


/* Welche Protokolle einkompiliert werden.
   ARP ist fuer die IP->MAC-Aufloesung zwingend: ab 2025-01-10 gated IP.cpp
   den Sende-Pfad ueber COMPILE_ARP (Referenz: mtcp/APPS/FTP/FTP.CFG).
   DNS braucht UDP; FTP braucht TCP. ICMP (Ping) wird nicht benoetigt. */
#define COMPILE_ARP
#define COMPILE_UDP
#define COMPILE_TCP
#define COMPILE_DNS


/* Tracing: falls nicht global abgeschaltet, lokal erlauben (aus). */
#if !defined(NOTRACE)
#undef NOTRACE
/* #define NOTRACE */
#endif

#define PKT_DUMP_BYTES (256)


/* Packet-Layer */
#define PACKET_BUFFERS      (20)    /* eingehende Puffer            */
#define PACKET_BUFFER_LEN (1514)    /* Groesse je Puffer (Ethernet) */


/* ARP */
#define ARP_MAX_ENTRIES  (10)       /* Groesse ARP-Cache            */
#define ARP_MAX_PENDING   (5)       /* max. offene Requests         */
#define ARP_RETRIES       (3)       /* Versuche gesamt              */
#define ARP_TIMEOUT   (500ul)       /* Zeit zwischen Versuchen      */


/* IP (mit Fragment-Reassembly) */
#define IP_FRAGMENTS_ON
#define IP_MAX_FRAG_PACKETS              (4)
#define IP_MAX_FRAGS_PER_PACKET         (10)
#define IP_BIGPACKET_SIZE             (1500)
#define IP_FRAG_REASSEMBLY_TIMEOUT  (4000ul)


/* TCP
   TCP_MAX_SOCKETS: wir brauchen gleichzeitig Steuer- + Datenverbindung.
   4 gibt etwas Reserve (z.B. waehrend eine Verbindung noch schliesst). */
#ifdef COMPILE_TCP
#define TCP_MAX_SOCKETS          (4)   /* nur 8 Bit                 */
#define TCP_MAX_XMIT_BUFS       (20)   /* nur 8 Bit                 */
#define TCP_SOCKET_RING_SIZE     (4)   /* Zweierpotenz              */
#define TCP_CLOSE_TIMEOUT  (10000ul)
/* Kein TCP_LISTEN_CODE: wir nutzen ausschliesslich PASV (connect raus). */
#endif


/* UDP (nur fuer DNS) */
#ifdef COMPILE_UDP
#define UDP_MAX_CALLBACKS (5)
#endif


/* DNS */
#ifdef COMPILE_DNS
#define DNS_MAX_NAME_LEN  (128)
#define DNS_MAX_ENTRIES     (1)        /* 7 Bit (max 127)          */
#define DNS_HANDLER_PORT   (57)
#define DNS_RECURSION_DESIRED  (1)
#define DNS_INITIAL_SEND_TIMEOUT   (500ul)   /*  0.5 s             */
#define DNS_RETRY_THRESHOLD       (2000ul)   /*  2   s             */
#define DNS_TIMEOUT              (10000ul)   /* 10   s             */
#endif


#endif
