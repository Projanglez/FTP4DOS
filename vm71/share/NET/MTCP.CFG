# mTCP runtime config for the QEMU test VM (static, SLIRP user networking).
# Pointed to by SET MTCPCFG=C:\NET\MTCP.CFG in the guest AUTOEXEC.BAT.

# Packet driver software interrupt (matches NE2000.COM load: int 0x60).
packetint 0x60

hostname dostest

# QEMU SLIRP fixed addressing:
#   guest      10.0.2.15
#   gateway    10.0.2.2  (== the Windows host, where ftpserver.py runs)
#   nameserver 10.0.2.3
IPADDR     10.0.2.15
NETMASK    255.255.255.0
GATEWAY    10.0.2.2
NAMESERVER 10.0.2.3

# Larger MTU for better transfer throughput (max 1500).
mtu 1500
